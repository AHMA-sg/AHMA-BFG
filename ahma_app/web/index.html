<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ahma_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ahma_app</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera || '';
      var isMobileUserAgent = /android|iphone|ipad|ipod|mobile/i.test(userAgent);
      var hasTouch = navigator.maxTouchPoints > 1;
      var hasCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      var isMobileSize = Math.min(window.innerWidth, window.innerHeight) <= 820;

      window.__AHMA_IS_MOBILE_WEB__ = isMobileUserAgent || (hasTouch && hasCoarsePointer && isMobileSize);

      if (window.__AHMA_IS_MOBILE_WEB__) {
        document.documentElement.classList.add('mobile-web');
      }
    })();
  </script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f4eee6;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .web-stage {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 18% 12%, rgba(122, 138, 103, 0.16), transparent 28%),
        radial-gradient(circle at 82% 88%, rgba(153, 71, 55, 0.12), transparent 32%),
        #f4eee6;
    }

    #flutter-phone-frame {
      position: relative;
      width: min(390px, calc(100vw - 32px));
      height: min(844px, calc(100dvh - 32px));
      overflow: hidden;
      border-radius: 36px;
      background: #f8f2ea;
      box-shadow:
        0 28px 90px rgba(55, 46, 38, 0.22),
        0 0 0 10px rgba(255, 255, 255, 0.52),
        0 0 0 11px rgba(92, 70, 53, 0.08);
    }

    .loading-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(70, 63, 56, 0.68);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    html.mobile-web body {
      overflow: auto;
      background: #f2ebe1;
    }

    html.mobile-web .web-stage {
      display: block;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      background: #f2ebe1;
    }

    html.mobile-web #flutter-phone-frame {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
      background: #f2ebe1;
    }

    @media (max-width: 480px) {
      .web-stage {
        padding: 0;
      }

      #flutter-phone-frame {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="web-stage">
    <div id="flutter-phone-frame">
      <div class="loading-label">Loading AHMA...</div>
    </div>
  </main>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
